site_name: OpenArmature
site_url: https://openarmature.ai/
site_description: Workflow framework for LLM pipelines and tool-calling agents
copyright: "©OpenArmature 2026"

# Local ``mkdocs serve`` binds here. Default 8000 was already in use
# on the maintainer's workstation; 8765 is the project convention.
dev_addr: "127.0.0.1:8765"

theme:
  name: material
  # Override directory for theme partials. ``docs/overrides/`` carries
  # the customized ``partials/header.html`` that makes the
  # "OpenArmature" wordmark clickable (Material's default leaves it
  # as a plain ``<div>``).
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.indexes
    - navigation.tabs
    - navigation.expand
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            members_order: source
            separate_signature: true
            filters: ["!^_"]
            merge_init_into_class: true
            show_signature_annotations: true
            signature_crossrefs: true
  - glightbox
  # /llms.txt + /llms-full.txt for AI coding assistants. Plain-text
  # versions of the docs that assistants can ingest in one shot —
  # matches the charter's "agent-friendly" framing.
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - getting-started/*.md
        Concepts:
          - concepts/*.md
        Patterns:
          - patterns/*.md
        Examples:
          - examples/*.md
        Model Providers:
          - model-providers/*.md
        Reference:
          - reference/*.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Documentation:
    - OpenArmature: index.md
    - Getting Started:
      - Quickstart: getting-started/index.md
    - Concepts:
      - concepts/index.md
      - State and reducers: concepts/state-and-reducers.md
      - Graphs: concepts/graphs.md
      - Composition: concepts/composition.md
      - Middleware: concepts/middleware.md
      - Fan-out: concepts/fan-out.md
      - Parallel branches: concepts/parallel-branches.md
      - LLMs: concepts/llms.md
      - Prompts: concepts/prompts.md
      - Observability: concepts/observability.md
      - Checkpointing: concepts/checkpointing.md
    - Model Providers:
      - model-providers/index.md
      - Self-hosted vLLM: model-providers/vllm.md
      - Authoring a Provider: model-providers/authoring.md
    - Reference:
      - reference/index.md
      - openarmature.graph: reference/graph.md
      - openarmature.llm: reference/llm.md
      - openarmature.prompts: reference/prompts.md
      - openarmature.checkpoint: reference/checkpoint.md
      - openarmature.observability: reference/observability.md
  - Examples:
    - examples/index.md
    - Foundations:
      - Hello, world: examples/hello-world.md
    - Composition:
      - Routing and subgraphs: examples/routing-and-subgraphs.md
      - Explicit subgraph mapping: examples/explicit-subgraph-mapping.md
      - Nested subgraphs: examples/nested-subgraphs.md
    - Concurrency:
      - Fan-out with retry: examples/fan-out-with-retry.md
      - Parallel branches: examples/parallel-branches.md
    - Prompts:
      - Multimodal prompt: examples/multimodal-prompt.md
      - Chat with multimodal: examples/chat-with-multimodal.md
    - Tool use:
      - Tool use: examples/tool-use.md
    - Reliability:
      - Checkpointing and migration: examples/checkpointing-and-migration.md
    - Observability:
      - Observer hooks: examples/observer-hooks.md
      - Langfuse observability: examples/langfuse-observability.md
      - Production observability: examples/production-observability.md
  - Patterns:
    - patterns/index.md
    - Parameterized entry point: patterns/parameterized-entry-point.md
    - Tool dispatch as node: patterns/tool-dispatch-as-node.md
    - Session as checkpoint resume: patterns/session-as-checkpoint-resume.md
    - Bypass if output exists: patterns/bypass-if-output-exists.md
    - State migration on resume: patterns/state-migration-on-resume.md
    - Caller-supplied trace identifiers: patterns/caller-supplied-trace-identifiers.md
    - Custom observer reconciliation: patterns/observer-state-reconciliation.md

extra:
  # Hide the "Made with Material for MkDocs" footer.
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LunarCommand

extra_css:
  - stylesheets/extra.css
